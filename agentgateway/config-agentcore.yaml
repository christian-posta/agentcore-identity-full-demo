# AgentCore with JWT auth and user-id header forwarding.
# JWT auth runs at the route level; validated claims (e.g. jwt.sub) are passed to AgentCore
# via X-Amzn-Bedrock-AgentCore-Runtime-User-Id when using IAM/SigV4.
binds:
- port: 3000
  listeners:
  - routes:
    - matches:
      - path:
          pathPrefix: /supply-chain-agent
      policies:
        jwtAuth:
          mode: strict
          issuer: https://ceposta-solo.auth0.com/
          audiences: [https://api.supply-chain-ui.local]
          jwks:
            url: https://ceposta-solo.auth0.com/.well-known/jwks.json
      backends:
      - aws:
          agentCore:
            agentRuntimeArn: "arn:aws:bedrock-agentcore:us-west-2:606469916935:runtime/a2a_supply_chain_agent-CV8obwHtr5"
        policies:
          transformations:
            request:
              set:
                X-Amzn-Bedrock-AgentCore-Runtime-User-Id: "user-foo"
                X-Amzn-Bedrock-AgentCore-Runtime-Custom-User-Id: "user-foo"
